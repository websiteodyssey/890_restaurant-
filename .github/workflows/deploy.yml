name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci
        working-directory: client

      - name: Build (sous-chemin du dépôt)
        run: npx vite build --base=/890_restaurant-/
        working-directory: client

      - name: Corriger les chemins d'images/vidéos
        run: find dist/assets -name '*.js' -exec sed -i 's#"/images/#"/890_restaurant-/images/#g; s#"/video/#"/890_restaurant-/video/#g' {} +
        working-directory: client

      - name: Fallback SPA + .nojekyll
        run: cp dist/index.html dist/404.html && touch dist/.nojekyll
        working-directory: client

      - name: Publier sur gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
